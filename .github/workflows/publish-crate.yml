name: Publish Crate

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'README.md'
      - 'LICENSE'
      - 'CHANGELOG.md'
      - 'docs/**'
      - '.github/workflows/publish-crate.yml'
      - '!.github/**/*.md'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish the current Cargo.toml version to crates.io'
        required: true
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: publish-crate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package crate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check package
        run: cargo package

  publish:
    name: Publish to crates.io
    needs: package
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Read crate metadata
        id: crate
        run: |
          metadata="$(cargo metadata --no-deps --format-version 1)"
          echo "name=$(echo "$metadata" | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$metadata" | jq -r '.packages[0].version')" >> "$GITHUB_OUTPUT"

      - name: Check crates.io version
        id: crates
        run: |
          response="$(curl -fsSL "https://crates.io/api/v1/crates/${{ steps.crate.outputs.name }}" || true)"
          published=false

          if [ -n "$response" ] && echo "$response" | jq -e --arg version "${{ steps.crate.outputs.version }}" '.versions[]? | select(.num == $version)' >/dev/null; then
            published=true
          fi

          echo "published=$published" >> "$GITHUB_OUTPUT"

      - name: Publish crate
        if: steps.crates.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Skip already published version
        if: steps.crates.outputs.published == 'true'
        run: echo "${{ steps.crate.outputs.name }} ${{ steps.crate.outputs.version }} is already published on crates.io"

  release:
    name: Create GitHub Release
    needs: publish
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read crate version
        id: crate
        run: |
          version="$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.crate.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        if: steps.check.outputs.exists != 'true'
        id: changelog
        run: |
          version="${{ steps.crate.outputs.version }}"
          notes="$(awk "/^## $version/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)"
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists
        if: steps.check.outputs.exists != 'true'
        run: |
          tag="${{ steps.crate.outputs.tag }}"
          if ! git rev-parse "$tag" &>/dev/null; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi

      - name: Create release
        if: steps.check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.crate.outputs.tag }}" \
            --title "${{ steps.crate.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --generate-notes
