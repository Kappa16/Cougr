gitname: Murdoku CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'examples/murdoku/**'
      - '.github/workflows/murdoku.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/murdoku/**'
      - '.github/workflows/murdoku.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          toolchain: stable
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli
      - name: Murdoku Validation
        working-directory: examples/murdoku
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test
          stellar contract build
